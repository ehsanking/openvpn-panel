services:
  app:
    build: .
    image: powervpn-panel:local
    container_name: powervpn
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    volumes:
      # Persists panel.sqlite and .jwt_secret across rebuilds. Mount as a
      # named volume rather than a host path so it survives `docker compose
      # down` without bind-mount permission headaches.
      - panel-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M

volumes:
  panel-data:
